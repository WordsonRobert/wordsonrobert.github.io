<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMS // Wordson Robert</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier Prime', monospace;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
        }

        #start-screen h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-style: italic;
            margin-bottom: 30px;
            color: #ffaa00;
        }

        #start-screen p {
            font-size: 1rem;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        .btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #ffaa00;
            color: #ffaa00;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #ffaa00;
            color: #000;
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            color: #00ff00;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .top-left {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .bottom-left {
            position: absolute;
            bottom: 20px;
            left: 20px;
        }

        .bottom-right {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
        }

        .data-row {
            margin: 5px 0;
            font-family: 'Courier Prime', monospace;
        }

        .highlight {
            color: #ffaa00;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .crosshair.active {
            border-color: #ffaa00;
            width: 30px;
            height: 30px;
            box-shadow: 0 0 20px #ffaa00;
        }

        #scanner {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 1px solid #ffaa00;
            min-width: 250px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #scan-title {
            font-size: 1.2rem;
            color: #ffaa00;
            margin-bottom: 10px;
        }

        .meta {
            color: #00ff00;
            font-size: 0.9rem;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            color: #ffaa00;
            text-decoration: none;
            font-size: 1rem;
            font-family: 'Courier Prime', monospace;
            padding: 10px 20px;
            border: 2px solid #ffaa00;
            background: rgba(0, 0, 0, 0.8);
            transition: all 0.3s;
        }

        .back-link:hover {
            background: #ffaa00;
            color: #000;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HOME</a>

    <div id="start-screen">
        <h1>THE ARCHIVE FIELD</h1>
        <p>WASD to Move // MOUSE to Look // CLICK to Inspect</p>
        <button class="btn" id="start-btn">INITIALIZE LINK</button>
    </div>

    <div id="hud">
        <div class="crosshair" id="crosshair"></div>
        
        <div class="top-left">
            <div class="data-row">SYS.ONLINE</div>
            <div class="data-row">RENDER: VULKAN_0.9</div>
            <div class="data-row" id="fps-counter">FPS: 60</div>
        </div>

        <div class="bottom-left">
            <div class="data-row" id="pos-display">POS: 0, 0, 0</div>
            <div class="data-row">SECTOR: NULL</div>
        </div>

        <div class="bottom-right">
            <div class="data-row">ENTITIES: 2048</div>
            <div class="data-row highlight">CHILD_SIGNAL: DETECTED</div>
        </div>

        <div id="scanner">
            <h2 id="scan-title">TITLE</h2>
            <div class="meta" id="scan-meta">YEAR // ID</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // === DATA ===
        const MOVIE_TITLES = [
            "BLADE RUNNER", "AKIRA", "SOLARIS", "THE THING", "ALIEN", "STALKER", 
            "HEREDITARY", "MIDSOMMAR", "THE LIGHTHOUSE", "DUNE", "2001: SPACE ODYSSEY", 
            "METROPOLIS", "BRAZIL", "VIDEODROME", "TETSUO", "PI", 
            "ERASERHEAD", "THE FLY", "POSSESSION", "SUSPIRIA"
        ];
        const YOUTUBE_IDS = ['J7nZp256oYk', 'cy7615-jF0M', 'dFk75_Y4vG4', '2HkjrJ6IK5E'];
        const DATABASE = Array.from({ length: 60 }, (_, i) => ({
            id: YOUTUBE_IDS[i % YOUTUBE_IDS.length],
            title: MOVIE_TITLES[i % MOVIE_TITLES.length],
            year: 1970 + Math.floor(Math.random() * 55),
            x: (Math.random() - 0.5) * 450, 
            z: (Math.random() - 0.5) * 450
        }));

        // === SETUP ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202); 
        scene.fog = new THREE.FogExp2(0x020202, 0.012);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const cssRenderer = new CSS3DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = '0';
        cssRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas-container').appendChild(cssRenderer.domElement);

        // === BLOOM ===
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloom.threshold = 0.1; 
        bloom.strength = 1.0;
        bloom.radius = 0.8;
        composer.addPass(bloom);

        // === CONTROLS ===
        const controls = new PointerLockControls(camera, document.body);
        const startBtn = document.getElementById('start-btn');
        if(startBtn) startBtn.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.opacity = 1;
        });
        controls.addEventListener('unlock', () => {
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('hud').style.opacity = 0.5;
        });

        // === WORLD ===
        const floorGeo = new THREE.PlaneGeometry(1200, 1200);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x010101, 
            roughness: 1.0, 
            metalness: 0.0 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // THE SHIP
        const shipGroup = new THREE.Group();
        shipGroup.position.set(0, -6, -70);
        shipGroup.scale.set(7, 7, 7);
        scene.add(shipGroup);

        const shipMat = new THREE.MeshStandardMaterial({ 
            color: 0x050505,
            roughness: 0.2,
            metalness: 0.8,
            emissive: 0xffaa00,
            emissiveIntensity: 0.5
        });

        const hull = new THREE.Mesh(new THREE.CylinderGeometry(8, 12, 50, 16), shipMat);
        hull.rotation.x = Math.PI / 2;
        hull.rotation.z = -0.15;
        shipGroup.add(hull);

        const engine = new THREE.Mesh(new THREE.TorusGeometry(8, 2, 16, 32), shipMat);
        engine.position.set(0, 5, -25);
        engine.rotation.y = Math.PI / 2;
        shipGroup.add(engine);

        const mainLight = new THREE.PointLight(0xffaa00, 8, 300);
        mainLight.position.set(0, 15, 0);
        mainLight.castShadow = true;
        shipGroup.add(mainLight);

        // GRASS
        const grassCount = 45000; 
        const grassGeo = new THREE.PlaneGeometry(0.15, 0.9); 
        const grassMat = new THREE.MeshStandardMaterial({
            color: 0x222222, 
            emissive: 0xaaaaaa,
            emissiveIntensity: 0.15,
            side: THREE.DoubleSide
        });
        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
        const dummy = new THREE.Object3D();

        for (let i = 0; i < grassCount; i++) {
            dummy.position.set(
                (Math.random() - 0.5) * 550,
                0.45,
                (Math.random() - 0.5) * 550
            );
            dummy.rotation.set(0, Math.random() * Math.PI, 0);
            dummy.scale.setScalar(Math.random() * 0.4 + 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(grassMesh);

        // THE GHOST
        const ghostGroup = new THREE.Group();
        ghostGroup.position.set(0, 5, -20); 
        scene.add(ghostGroup);

        const ghostGeo = new THREE.CylinderGeometry(1, 3, 7, 32, 10, true);
        const ghostMat = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff, 
            roughness: 0.4,
            metalness: 0.1,
            transmission: 0.2,
            thickness: 1.0,
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.9,
            emissive: 0xccccff,
            emissiveIntensity: 0.2
        });
        const ghostMesh = new THREE.Mesh(ghostGeo, ghostMat);
        ghostGroup.add(ghostMesh);

        const eyeGeo = new THREE.SphereGeometry(0.25);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const lEye = new THREE.Mesh(eyeGeo, eyeMat); 
        lEye.position.set(-0.5, 2, 0.9);
        const rEye = new THREE.Mesh(eyeGeo, eyeMat); 
        rEye.position.set(0.5, 2, 0.9);
        ghostGroup.add(lEye); 
        ghostGroup.add(rEye);

        const ghostLight = new THREE.PointLight(0xaaccff, 2, 20);
        ghostGroup.add(ghostLight);

        // MONOLITHS
        const monolithGeo = new THREE.BoxGeometry(2.5, 7, 0.8);
        const monolithMat = new THREE.MeshStandardMaterial({ 
            color: 0x050505, 
            roughness: 0.1,
            metalness: 0.6,
        });

        DATABASE.forEach((data) => {
            const group = new THREE.Group();
            group.position.set(data.x, 3.5, data.z);
            group.rotation.y = Math.random() * Math.PI;
            
            const mesh = new THREE.Mesh(monolithGeo, monolithMat);
            mesh.castShadow = true; 
            mesh.receiveShadow = true;
            group.add(mesh);
            
            group.userData = { id: data.id, title: data.title, year: data.year, active: false };
            scene.add(group);
        });

        // SHIMMER
        const shimmerGeo = new THREE.SphereGeometry(400, 64, 64);
        const shimmerMat = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, viewVector: { value: new THREE.Vector3() } },
            vertexShader: `
                varying vec3 vNormal; 
                varying vec3 vViewPosition;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vViewPosition = -mvPosition.xyz;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float time; 
                varying vec3 vNormal; 
                varying vec3 vViewPosition;
                void main() {
                    vec3 viewDir = normalize(vViewPosition);
                    float fresnel = dot(viewDir, vNormal);
                    fresnel = 1.0 - fresnel;
                    fresnel = pow(fresnel, 5.0);
                    
                    vec3 color = vec3(0.0);
                    color.r = 1.0;
                    color.g = 0.9 + sin(time) * 0.1;
                    color.b = 0.8 + cos(time) * 0.2;
                    
                    float opacity = smoothstep(0.4, 1.0, fresnel) * 0.15;
                    gl_FragColor = vec4(color, opacity);
                }
            `,
            transparent: true, 
            side: THREE.BackSide, 
            depthWrite: false, 
            blending: THREE.AdditiveBlending
        });
        const shimmerSphere = new THREE.Mesh(shimmerGeo, shimmerMat);
        scene.add(shimmerSphere);

        // === LIGHTS ===
        const ambient = new THREE.AmbientLight(0x050505, 1.0);
        scene.add(ambient);
        const flashLight = new THREE.SpotLight(0xffeedd, 2, 100, 0.5, 0.5);
        flashLight.position.set(0, 0, 0);
        camera.add(flashLight);
        scene.add(camera);

        // === ANIMATION ===
        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0);
        let moveF = false, moveB = false, moveL = false, moveR = false;
        const velocity = new THREE.Vector3(); 
        const direction = new THREE.Vector3();
        const ghostPosAttr = ghostGeo.attributes.position;
        const originalGhostPos = ghostPosAttr.array.slice();
        let prevTime = performance.now();

        document.addEventListener('keydown', (e) => {
            switch(e.code) { 
                case 'KeyW': moveF = true; break; 
                case 'KeyA': moveL = true; break; 
                case 'KeyS': moveB = true; break; 
                case 'KeyD': moveR = true; break; 
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) { 
                case 'KeyW': moveF = false; break; 
                case 'KeyA': moveL = false; break; 
                case 'KeyS': moveB = false; break; 
                case 'KeyD': moveR = false; break; 
            }
        });
        document.addEventListener('mousedown', () => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const hit = intersects.find(i => i.object.parent && i.object.parent.userData.id);
            if(hit && camera.position.distanceTo(hit.object.parent.position) < 15) {
                const group = hit.object.parent;
                if(group.userData.active) return;
                const div = document.createElement('div'); 
                div.innerHTML = `<iframe width="640" height="360" src="https://www.youtube.com/embed/${group.userData.id}?autoplay=1&rel=0" frameborder="0"></iframe>`;
                div.style.background = '#000';
                const cssObj = new CSS3DObject(div);
                cssObj.scale.set(0.005, 0.005, 0.005); 
                cssObj.position.set(0, 0, 0.5);
                group.add(cssObj);
                group.userData.active = true;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta; 
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveF) - Number(moveB); 
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();
                if (moveF || moveB) velocity.z -= direction.z * 100.0 * delta;
                if (moveL || moveR) velocity.x -= direction.x * 100.0 * delta;
                controls.moveRight(-velocity.x * delta); 
                controls.moveForward(-velocity.z * delta);
            }

            const positions = ghostGeo.attributes.position.array;
            for(let i = 0; i < positions.length; i += 3) {
                if(originalGhostPos[i + 1] < 1.0) {
                    positions[i] = originalGhostPos[i] + Math.sin(time * 0.003 + originalGhostPos[i + 1]) * 0.2;
                    positions[i + 2] = originalGhostPos[i + 2] + Math.cos(time * 0.002 + originalGhostPos[i + 1]) * 0.2;
                }
            }
            ghostGeo.attributes.position.needsUpdate = true;
            
            const gAngle = time * 0.0002;
            ghostGroup.position.x = Math.sin(gAngle) * 30; 
            ghostGroup.position.z = Math.cos(gAngle) * 30 - 30; 
            ghostGroup.lookAt(camera.position);

            shipMat.emissiveIntensity = 0.5 + Math.sin(time * 0.002) * 0.3;
            mainLight.intensity = 8 + Math.sin(time * 0.002) * 4;
            
            shimmerMat.uniforms.time.value = time * 0.001;
            shimmerSphere.position.copy(camera.position);

            document.getElementById('pos-display').innerText = `POS: ${Math.round(camera.position.x)}, ${Math.round(camera.position.z)}`;
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const hit = intersects.find(i => i.object.parent && i.object.parent.userData.id);
            const crosshair = document.getElementById('crosshair');
            const scanner = document.getElementById('scanner');
            
            if (hit && camera.position.distanceTo(hit.object.parent.position) < 20) {
                crosshair.classList.add('active'); 
                scanner.style.opacity = 1;
                document.getElementById('scan-title').innerText = hit.object.parent.userData.title;
                document.getElementById('scan-meta').innerText = `ID: ${hit.object.parent.userData.year}`;
            } else {
                crosshair.classList.remove('active'); 
                scanner.style.opacity = 0;
            }

            composer.render();
            cssRenderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
